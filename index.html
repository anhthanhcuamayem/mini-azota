<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống thi Nhóm 3</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 600px; width: 100%; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .q-card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .option { display: block; padding: 10px; background: #f8fafc; margin: 5px 0; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div id="login-screen">
        <h2>NHÓM 3 - PHÒNG THI</h2>
        <input type="text" id="name" placeholder="Họ và tên">
        <input type="text" id="code" placeholder="Mã (group3laso1)">
        <button onclick="startTest()">BẮT ĐẦU</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="questions-list">
            <div class="q-card">
                <p><strong>Câu 1:</strong> Trong Machine Learning, k-NN là gì?</p>
                <label class="option"><input type="radio" name="q1" value="Lazy learner"> Lazy learner</label>
                <label class="option"><input type="radio" name="q1" value="Eager learner"> Eager learner</label>
            </div>
            <div class="q-card">
                <p><strong>Câu 2:</strong> RNN thường bị lỗi gì?</p>
                <label class="option"><input type="radio" name="q2" value="Vanishing Gradient"> Vanishing Gradient</label>
                <label class="option"><input type="radio" name="q2" value="Data Augmentation"> Data Augmentation</label>
            </div>
        </div>
        <button onclick="submitExam()">NỘP BÀI</button>
    </div>
</div>

<script>
    let startTime;

    function startTest() {
        const name = document.getElementById('name').value;
        const code = document.getElementById('code').value;
        if (!name || code !== "group3laso1") {
            alert("Sai mã hoặc chưa nhập tên!"); return;
        }
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        startTime = new Date().toISOString();
    }

    async function submitExam() {
        const name = document.getElementById('name').value;
        const code = document.getElementById('code').value;
        const answers = {
            q1: document.querySelector('input[name="q1"]:checked')?.value,
            q2: document.querySelector('input[name="q2"]:checked')?.value
        };

        try {
            const res = await fetch('/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, code, answers, start_time: startTime })
            });
            const data = await res.json();
            if (res.ok) {
                alert(`Nộp thành công! Điểm: ${data.score}`);
                location.reload();
            } else {
                alert(data.error);
            }
        } catch (e) {
            alert("Lỗi kết nối server!");
        }
    }
</script>
</body>
</html>
