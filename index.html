<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhóm 3 - Thi trắc nghiệm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }
        .main-container {
            max-width: 900px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 28px 30px;
            margin-bottom: 30px;
        }
        .login-area {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 1rem;
        }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        button:hover {
            background: #4338ca;
        }
        .quiz-card {
            display: none;
        }
        .question-item {
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        .question-text {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 12px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            margin: 6px 0;
            background: #f8fafc;
            border-radius: 40px;
            cursor: pointer;
        }
        .option input {
            width: auto;
            margin: 0;
        }
        .submit-btn {
            margin-top: 20px;
            background: #10b981;
        }
        .leaderboard-table, .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .leaderboard-table th, .leaderboard-table td,
        .history-table th, .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .leaderboard-table th, .history-table th {
            background: #f1f5f9;
            font-weight: 600;
        }
        h3 {
            margin-bottom: 16px;
            color: #0f172a;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 500px;
            width: 90%;
            padding: 28px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            animation: fadeIn 0.2s ease;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h2 {
            color: #10b981;
            margin-bottom: 12px;
        }
        .modal-score {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 16px 0;
        }
        .close-modal {
            background: #4f46e5;
            margin-top: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95);}
            to { opacity: 1; transform: scale(1);}
        }
        .error-msg {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 8px;
            text-align: center;
        }
        .refresh-leaderboard {
            background: #e2e8f0;
            color: #1e293b;
            margin-top: 12px;
            font-size: 0.8rem;
            padding: 8px;
        }
        .loading {
            text-align: center;
            color: #64748b;
            padding: 20px;
        }
        .view-history-btn {
            background: #3b82f6;
            margin-top: 10px;
        }
        .history-item {
            margin-bottom: 8px;
        }
        .badge {
            display: inline-block;
            background: #e2e8f0;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8rem;
        }
        .text-center {
            text-align: center;
        }
    </style>
</head>
<body>
<div class="main-container">
    <!-- KHUNG ĐĂNG NHẬP -->
    <div class="card" id="loginCard">
        <div class="login-area">
            <h2>📚 NHÓM 3 - PHÒNG THI</h2>
            <input type="text" id="fullname" placeholder="Họ và tên">
            <input type="text" id="accessCode" placeholder="Mã (group3laso1)">
            <button id="startExamBtn">BẮT ĐẦU</button>
        </div>
    </div>

    <!-- KHUNG LÀM BÀI -->
    <div class="card quiz-card" id="quizCard">
        <div id="questionsContainer">
            <div class="question-item" data-qid="1">
                <div class="question-text">Câu 1: Trong Machine Learning, k-NN là gì?</div>
                <label class="option"><input type="radio" name="q1" value="Lazy learner"> Lazy learner</label>
                <label class="option"><input type="radio" name="q1" value="Eager learner"> Eager learner</label>
            </div>
            <div class="question-item" data-qid="2">
                <div class="question-text">Câu 2: RNN thường bị lỗi gì?</div>
                <label class="option"><input type="radio" name="q2" value="Vanishing Gradient"> Vanishing Gradient</label>
                <label class="option"><input type="radio" name="q2" value="Data Augmentation"> Data Augmentation</label>
            </div>
        </div>
        <button class="submit-btn" id="submitExam">📌 NỘP BÀI</button>
        <div id="submitError" class="error-msg"></div>
    </div>

    <!-- BẢNG XẾP HẠNG -->
    <div class="card">
        <h3>🏆 Bảng xếp hạng (Top 3 điểm cao nhất)</h3>
        <table class="leaderboard-table" id="leaderboardTable">
            <thead>
                <tr><th>#</th><th>Họ tên</th><th>Điểm</th><th>Thời gian</th></tr>
            </thead>
            <tbody id="leaderboardBody">
                <tr><td colspan="4" class="loading">Đang tải...</td></tr>
            </tbody>
        </table>
        <button class="refresh-leaderboard" id="refreshLeaderboardBtn">🔄 Làm mới bảng</button>
    </div>
</div>

<!-- MODAL KẾT QUẢ -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <h2>✅ HOÀN THÀNH</h2>
        <p>Bài làm của bạn đã được ghi nhận</p>
        <div class="modal-score" id="modalScore">0/2</div>
        <button class="view-history-btn" id="viewHistoryAfterSubmit" style="margin-top: 10px;">📜 Xem lịch sử của tôi</button>
        <button class="close-modal" onclick="closeResultModal()">Đóng</button>
    </div>
</div>

<!-- MODAL LỊCH SỬ -->
<div id="historyModal" class="modal">
    <div class="modal-content">
        <h2>📜 Lịch sử làm bài</h2>
        <div id="historyContent"></div>
        <button class="close-modal" onclick="closeHistoryModal()">Đóng</button>
    </div>
</div>

<script>
    let sessionId = null;
    let currentUser = "";
    let lastSubmittedName = "";

    async function loadLeaderboard() {
        try {
            const res = await fetch('/leaderboard');
            const data = await res.json();
            const tbody = document.getElementById('leaderboardBody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="4">Chưa có dữ liệu</td></tr>';
                return;
            }
            tbody.innerHTML = data.map((item, idx) => `
                <tr>
                    <td>${idx+1}</td>
                    <td>${escapeHtml(item.name)}</td>
                    <td><strong>${item.score}/2</strong></td>
                    <td>${item.duration_formatted}</td>
                </tr>
            `).join('');
        } catch(e) {
            console.error(e);
        }
    }

    async function loadUserHistory(name) {
        try {
            const res = await fetch(`/history/${encodeURIComponent(name)}`);
            const history = await res.json();
            const historyContent = document.getElementById('historyContent');
            
            if (!history.length) {
                historyContent.innerHTML = '<p class="text-center">Chưa có lịch sử làm bài</p>';
                return;
            }
            
            let html = '<table class="history-table"><thead><tr><th>Lần</th><th>Điểm</th><th>Thời gian làm</th><th>Ngày nộp</th></tr></thead><tbody>';
            history.forEach((item, idx) => {
                html += `
                    <tr>
                        <td>${idx + 1}</td>
                        <td><strong>${item.score}/2</strong></td>
                        <td>${item.duration_formatted}</td>
                        <td>${item.submitted_at}</td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            historyContent.innerHTML = html;
        } catch(e) {
            document.getElementById('historyContent').innerHTML = '<p class="text-center">Lỗi tải lịch sử</p>';
        }
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function showResultModal(score, name) {
        const modal = document.getElementById('resultModal');
        document.getElementById('modalScore').innerText = `${score}/2`;
        lastSubmittedName = name;
        modal.style.display = 'flex';
    }

    function closeResultModal() {
        document.getElementById('resultModal').style.display = 'none';
        loadLeaderboard();
        location.reload();
    }

    function showHistoryModal(name) {
        const modal = document.getElementById('historyModal');
        loadUserHistory(name);
        modal.style.display = 'flex';
    }

    function closeHistoryModal() {
        document.getElementById('historyModal').style.display = 'none';
    }

    function checkAllQuestionsAnswered() {
        const q1Selected = document.querySelector('input[name="q1"]:checked');
        const q2Selected = document.querySelector('input[name="q2"]:checked');
        if (!q1Selected || !q2Selected) {
            document.getElementById('submitError').innerText = "❌ Bạn chưa trả lời hết câu hỏi. Vui lòng chọn đáp án cho cả 2 câu.";
            return false;
        }
        document.getElementById('submitError').innerText = "";
        return true;
    }

    async function submitExam() {
        if (!checkAllQuestionsAnswered()) return;
        if (!sessionId) {
            alert("Lỗi: Không tìm thấy phiên làm bài!");
            return;
        }

        const q1Val = document.querySelector('input[name="q1"]:checked').value;
        const q2Val = document.querySelector('input[name="q2"]:checked').value;
        const answers = { q1: q1Val, q2: q2Val };

        const payload = {
            name: currentUser,
            code: "group3laso1",
            session_id: sessionId,
            answers: answers
        };

        try {
            const res = await fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (res.ok) {
                showResultModal(data.score, data.name);
                loadLeaderboard();
            } else {
                alert("Lỗi: " + (data.error || "Không thể nộp bài"));
            }
        } catch (err) {
            alert("Lỗi kết nối server!");
        }
    }

    async function startTest() {
        const name = document.getElementById('fullname').value.trim();
        const code = document.getElementById('accessCode').value.trim();
        
        if (!name || code !== "group3laso1") {
            alert("Sai mã truy cập hoặc chưa nhập họ tên!");
            return;
        }
        
        currentUser = name;
        
        try {
            const res = await fetch('/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, code: code })
            });
            const data = await res.json();
            
            if (res.ok) {
                sessionId = data.session_id;
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('quizCard').style.display = 'block';
                document.getElementById('submitError').innerText = "";
                document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
            } else {
                alert(data.error || "Không thể bắt đầu bài thi!");
            }
        } catch (err) {
            alert("Lỗi kết nối server!");
        }
    }

    // Event listeners
    document.getElementById('startExamBtn').addEventListener('click', startTest);
    document.getElementById('submitExam').addEventListener('click', submitExam);
    document.getElementById('refreshLeaderboardBtn').addEventListener('click', loadLeaderboard);
    document.getElementById('viewHistoryAfterSubmit').addEventListener('click', () => {
        if (lastSubmittedName) {
            closeResultModal();
            showHistoryModal(lastSubmittedName);
        }
    });

    loadLeaderboard();
</script>
</body>
</html>
